# Eval-mode Limbo — isolated vault, MCP logging enabled
# Usage: LIMBO_IMAGE=limbo:staging docker compose -f evals/docker-compose.eval.yml up -d
# Intentionally fails if LIMBO_IMAGE is unset to avoid accidentally testing
# ghcr.io/tomasward1/limbo:latest instead of the freshly built PR image.
services:
  limbo-eval:
    image: ${LIMBO_IMAGE:?LIMBO_IMAGE must be set (for example LIMBO_IMAGE=limbo:staging)}
    container_name: limbo-eval
    init: true
    restart: "no"
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - limbo-eval-data:/data
      - ./vault-seed:/data/vault
      - limbo-eval-zc:/home/limbo/.openclaw
      - ./config.eval.env:/data/config/.env
      - ~/.limbo-dev/secrets/auth-profiles.json:/data/config/auth-profiles.json:ro
    # Tokens (LLM_API_KEY, GATEWAY_TOKEN, TELEGRAM_BOT_TOKEN, GROQ_API_KEY,
    # BRAVE_API_KEY) come from the shared dev env file outside the repo so
    # they never get committed. Create it once from the contents of
    # ~/.limbo-dev/secrets/* before running the eval.
    env_file:
      - .env.eval
      - ~/.limbo-dev/eval-tokens.env
    environment:
      LIMBO_EVAL: "true"
      LIMBO_PORT: "18790"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp:size=100M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18790/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  limbo-eval-data:
  limbo-eval-zc:
