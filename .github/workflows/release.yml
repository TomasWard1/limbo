name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          # Strip leading 'v' for Docker tags
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Major.Minor for rolling tag
          MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          # Major only
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — pull and health check
        env:
          IMAGE_VERSION: ${{ steps.version.outputs.version }}
          FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          IMAGE="${FULL_IMAGE}:${IMAGE_VERSION}"
          echo "Pulling $IMAGE for smoke test..."
          docker pull --platform linux/amd64 "$IMAGE"

          # Start container with minimal required env
          CID=$(docker run -d \
            -p 18789:18789 \
            -e ANTHROPIC_API_KEY=smoke-test-key \
            "$IMAGE")

          # Give OpenClaw a few seconds to start
          sleep 8

          # Health check — OpenClaw exposes /health on the gateway port
          STATUS=$(docker exec "$CID" sh -c 'wget -qO- http://localhost:18789/health 2>/dev/null || echo "unreachable"')
          echo "Health response: $STATUS"

          docker stop "$CID" || true
          docker rm "$CID" || true

          # We accept "unreachable" here because ANTHROPIC_API_KEY is fake.
          # The goal is to verify the container starts and the entrypoint runs
          # without crashing. A real key is not available in CI.
          echo "Smoke test passed (container started successfully)"

      - name: Generate changelog
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write to file to preserve newlines
          echo "$LOG" > /tmp/changelog.md
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Limbo ${{ steps.version.outputs.tag }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
