name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [staging]

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

  mcp-server-check:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Check for syntax errors in MCP server
        working-directory: mcp-server
        run: node --check index.js

      - name: Check for syntax errors in setup server
        run: node --check setup-server/server.js

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Verify CLI module exports
        run: node -e "require('./cli.js')"

      - name: Run unit tests
        run: node --test test/cli-filter.test.js test/cli-auth.test.js test/openclaw-migration.test.js test/setup-server.test.js test/entrypoint.test.js test/cli-compose.test.js test/red-phase.test.js test/mcp-tools.test.js test/cli-wizard-parity.test.js
