services:
  limbo:
    image: ghcr.io/tomasward1/limbo:1
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - limbo-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "openclaw health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  limbo-data:
