services:
  limbo:
    # This file is a development reference. The CLI generates a versioned copy at install time.
    image: registry.gitlab.com/tomas209/limbo:latest
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev
      - /home/limbo/.npm:size=50M,noexec,nosuid,nodev,uid=999,gid=999
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - limbo-data:/data
      - ./vault:/data/vault
      - ./openclaw-state:/home/limbo/.openclaw
      - ./flags:/flags
    secrets:
      - llm_api_key
      - telegram_bot_token
      - gateway_token
      - groq_api_key
      - brave_api_key
    env_file:
      - .env
    environment:
      NODE_OPTIONS: "${LIMBO_NODE_OPTIONS:---max-old-space-size=512}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

secrets:
  llm_api_key:
    file: ./secrets/llm_api_key
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  gateway_token:
    file: ./secrets/gateway_token
  groq_api_key:
    file: ./secrets/groq_api_key
  brave_api_key:
    file: ./secrets/brave_api_key

volumes:
  limbo-data:
