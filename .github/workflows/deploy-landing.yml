name: Deploy Landing Page

# Deploys /web (static HTML/CSS/JS) to Cloudflare Pages.
#
# Branches:
#   staging → preview deployment (unique preview URL per push)
#   main    → production deployment (custom domain once configured)
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID (found in CF dashboard sidebar)
#
# One-time setup:
#   1. Create a Cloudflare Pages project named "limbo-landing"
#      via the CF dashboard (or `wrangler pages project create limbo-landing`)
#   2. Set the production branch to "main" in CF Pages settings
#   3. Add the two secrets above to this repo
#   4. (Optional) Add custom domain in CF Pages → Custom Domains

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'web/**'
      - '.github/workflows/deploy-landing.yml'

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=limbo-landing --branch=${{ github.ref_name }}

      - name: Print deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`$BRANCH_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $DEPLOYMENT_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "> Production deployment" >> $GITHUB_STEP_SUMMARY
          else
            echo "> Preview deployment" >> $GITHUB_STEP_SUMMARY
          fi
