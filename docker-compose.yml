services:
  limbo:
    # This file is a development reference. The CLI generates a versioned copy at install time.
    image: ghcr.io/tomasward1/limbo:1.0.0
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev
      - /home/limbo/.npm:size=50M,noexec,nosuid,nodev
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - limbo-data:/data
      - ./vault:/data/vault
      - limbo-zeroclaw-state:/home/limbo/.zeroclaw
    secrets:
      - llm_api_key
      - telegram_bot_token
      - gateway_token
    env_file:
      - .env
    environment:
      NODE_OPTIONS: "${LIMBO_NODE_OPTIONS:---max-old-space-size=256}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "zeroclaw status --format=exit-code 2>/dev/null || node -e \"require('http').get('http://127.0.0.1:${LIMBO_PORT:-18789}/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

secrets:
  llm_api_key:
    file: ./secrets/llm_api_key
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  gateway_token:
    file: ./secrets/gateway_token

volumes:
  limbo-data:
  limbo-zeroclaw-state:
