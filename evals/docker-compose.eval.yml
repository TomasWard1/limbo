# Eval-mode Limbo — isolated vault, MCP logging enabled
# Usage: LIMBO_IMAGE=limbo:staging docker compose -f evals/docker-compose.eval.yml up -d
services:
  limbo-eval:
    image: ${LIMBO_IMAGE:-ghcr.io/tomasward1/limbo:latest}
    container_name: limbo-eval
    restart: "no"
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - limbo-eval-data:/data
      - ./vault-seed:/data/vault
      - limbo-eval-zc:/home/limbo/.zeroclaw
      - ./config.eval.env:/data/config/.env:ro
    secrets:
      - llm_api_key
      - gateway_token
      - telegram_bot_token
      - groq_api_key
      - brave_api_key
    env_file:
      - .env.eval
    environment:
      LIMBO_EVAL: "true"
      LIMBO_PORT: "18790"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp:size=100M
    healthcheck:
      test: ["CMD-SHELL", "zeroclaw status --format=exit-code 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

secrets:
  llm_api_key:
    file: ~/.limbo-dev/secrets/llm_api_key
  gateway_token:
    file: ~/.limbo-dev/secrets/gateway_token
  telegram_bot_token:
    file: ~/.limbo-dev/secrets/telegram_bot_token
  groq_api_key:
    file: ~/.limbo-dev/secrets/groq_api_key
  brave_api_key:
    file: ~/.limbo-dev/secrets/brave_api_key

volumes:
  limbo-eval-data:
  limbo-eval-zc:
