# Limbo agent evals — powered by promptfoo
# Run: npx promptfoo eval -c evals/promptfoo/promptfooconfig.yaml
# View: npx promptfoo view
#
# IMPORTANT: tests share a single container. Order matters.
# Read-only tests first, then writes, then destructive (cron/user).
# Run with -j 1 to enforce sequential execution.

description: Limbo core agent evals

prompts:
  - "{{prompt}}"

providers:
  - file://./provider.js

# Sequential execution — tests share container state and are ordered to avoid conflicts
maxConcurrency: 1

tests:
  # ── READ-ONLY TESTS (depend on seed, don't modify vault) ──────────────────

  # 1. find-and-read-note: searches and reads a pre-seeded birthday note
  - description: "find-and-read-note: finds and reads a seeded note about a birthday"
    vars:
      prompt: "Que sabes sobre el cumpleaños de Tomas?"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: vault_search
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: vault_read
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "15"

  # ── GOOGLE CALENDAR READ TESTS (mocked gws — see evals/fixtures/gws/) ────
  # These run against a mock `gws` binary installed into the eval container
  # by hooks.js. They validate the agent-layer wiring (tool selection, param
  # formatting) without hitting real Google APIs or needing OAuth. Real end-
  # to-end integration is covered by manual QA on the feat/google-calendar
  # branch.
  #
  # The create/update/delete tests are placed later, AFTER the tz-flow, so
  # USER.md has a timezone set by then and we can assert the agent passes
  # it to calendar_create/update as the skill requires.

  # calendar-read-today: agent reads today's events when asked about schedule
  - description: "calendar-read-today: lists today's events when asked about schedule"
    vars:
      prompt: "¿Qué tengo agendado para hoy?"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_read
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_read
          key: startDate
          pattern: "^\\d{4}-\\d{2}-\\d{2}"
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(standup|almuerzo|1:1|juan|equipo)"

  # calendar-read-week: agent passes a date range when asked about the week
  - description: "calendar-read-week: passes a date range when asked about the week"
    vars:
      prompt: "¿Qué reuniones tengo esta semana?"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_read
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_read
          key: endDate
          pattern: "^\\d{4}-\\d{2}-\\d{2}"

  # ── WRITE TESTS (create new notes, don't touch seeds) ─────────────────────

  # 3. write-note: saves a new fact (unique ID, won't collide with seeds)
  - description: "write-note: saves a personal fact to the vault"
    vars:
      prompt: "Acordate que soy alérgico al maní"
    assert:
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(guard[eé]|saved|anot[eé]|listo|hecho|mani|maní)"
      - type: javascript
        value: file://./assertions.js:vaultNoteCreated
        config:
          count: 1
          pattern: "mani"

  # ── CRON TESTS ─────────────────────────────────────────────────────────────

  # 3a. set-timezone (turn 1): agent asks for timezone
  #     toolCalled: workspace_read works because it's an MCP tool
  - description: "set-timezone-turn1: asks for timezone when not configured"
    vars:
      prompt: "Recordame mañana a las 9am que tengo que llamar al banco"
      __sessionGroup: "tz-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: workspace_read
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(timezone|huso horario|zona horaria|qu[eé] hora|d[oó]nde)"

  # 3b. set-timezone-and-create-reminder (turn 2): user provides timezone,
  #     agent saves tz to USER.md AND creates the reminder in one shot.
  - description: "set-timezone-and-create-reminder: saves tz + creates cron in one turn"
    vars:
      prompt: "ART"
      __sessionGroup: "tz-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: workspace_write
      - type: javascript
        value: file://./assertions.js:userProfileMatches
        config:
          pattern: "(?i)(ART|argentina|buenos.aires)"
      - type: javascript
        value: file://./assertions.js:cronCountIncreased
        config:
          by: 1

  # ── GOOGLE CALENDAR WRITE FLOWS ──────────────────────────────────────────
  # Multi-turn flows because the skill mandates explicit confirmation before
  # create / update / delete (see workspace/skills/google-calendar/SKILL.md
  # §Rules). Each flow is self-contained — the prompt injects the timezone
  # explicitly so the test doesn't depend on the tz-flow having run first.

  # calendar-create-flow turn 1: the skill mandates "show details + ask
  # confirmation" before calling calendar_create. Agent should gather
  # details and echo them back without actually calling the tool yet.
  - description: "calendar-create-flow-turn1: parses details and asks confirmation"
    vars:
      prompt: "Agendame reunión con Martín mañana a las 3pm por 1 hora. Mi zona horaria es Buenos Aires, Argentina (ART)."
      __sessionGroup: "calendar-create-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(mart[ií]n|confirm|15:00|3.?pm|agendo|¿|\\?)"

  # calendar-create-flow turn 2: user confirms → agent calls calendar_create
  # with title, startTime=T15:00, and the timeZone the user stated in turn 1.
  - description: "calendar-create-flow-turn2: creates event with title, start time, and timezone"
    vars:
      prompt: "Sí, dale, creala"
      __sessionGroup: "calendar-create-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_create
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_create
          key: title
          pattern: "(?i)mart[ií]n"
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_create
          key: startTime
          pattern: "T15:00"
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_create
          key: timeZone
          pattern: "(?i)(argentina|buenos.aires|america/)"
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(agend|cre[eé]|list[oa]|arm[eé])"

  # calendar-update-flow turn 1: agent reads calendar to find the event and
  # asks confirmation before modifying. The skill mandates "show diff + ask".
  # Uses "mañana" (not "hoy") so the test is time-of-day independent — if
  # the test runs after 5pm Argentina time, "hoy a las 5pm" is in the past
  # and the agent refuses (correct behavior, wrong test).
  - description: "calendar-update-flow-turn1: reads calendar and asks confirmation before updating"
    vars:
      prompt: "Movelo el 1:1 con Juan a las 5pm de mañana. Mi zona horaria es Buenos Aires, Argentina (ART)."
      __sessionGroup: "calendar-update-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_read
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(confirm|cambio|mover|paso|queda|¿|\\?)"

  # calendar-update-flow turn 2: user confirms → agent calls calendar_update
  # with the eventId from turn 1's read and the new startTime
  - description: "calendar-update-flow-turn2: on confirmation, updates event with eventId + new startTime"
    vars:
      prompt: "Dale, confirmado"
      __sessionGroup: "calendar-update-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_update
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_update
          key: eventId
          pattern: "mock-evt-00[123]"
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_update
          key: startTime
          pattern: "T17:00"

  # calendar-delete-flow turn 1: agent reads calendar to locate the event
  # and asks confirmation before deleting (skill: "Never delete without
  # explicit confirmation")
  - description: "calendar-delete-flow-turn1: reads calendar and asks confirmation before deleting"
    vars:
      prompt: "Borrá el almuerzo con equipo"
      __sessionGroup: "calendar-delete-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_read
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: "(?i)(borr|elimin|confirm|seguro|¿|\\?)"

  # calendar-delete-flow turn 2: user confirms → agent calls calendar_delete
  # with the eventId of "Almuerzo con equipo" (mock-evt-002)
  - description: "calendar-delete-flow-turn2: on confirmation, deletes event by eventId"
    vars:
      prompt: "Sí, borralo"
      __sessionGroup: "calendar-delete-flow"
    assert:
      - type: javascript
        value: file://./assertions.js:toolCalled
        config:
          tool: calendar_delete
      - type: javascript
        value: file://./assertions.js:paramMatch
        config:
          tool: calendar_delete
          key: eventId
          pattern: "mock-evt-00[123]"

  # ── USER PROFILE TESTS (modifies USER.md — runs last) ─────────────────────

  # 5. write-user-name: persists name to USER.md
  - description: "write-user-name: persists user name to USER.md"
    vars:
      prompt: "Che, me llamo Santiago. Guardalo así te acordás"
    assert:
      - type: javascript
        value: file://./assertions.js:userProfileMatches
        config:
          pattern: "(?i)santiago"

  # ── REGRESSION TESTS ──────────────────────────────────────────────────────

  # 6. voice-transcription: regression guard for the openclaw voice pipeline.
  #    Uses a dedicated provider (audio-provider.js) that invokes
  #    `openclaw infer audio transcribe` directly against a fixture m4a,
  #    and surfaces both the config pin (tools.media.audio.models) and the
  #    transcribe JSON in a single output so assertions can catch both
  #    the multipart patch regressing AND the entrypoint pin regressing.
  #    See docs/plans/ or the commit message of fix/voice-transcription-
  #    regression for the full story behind why both checks are needed.
  - description: "voice-transcription: Groq transcribes a fixture audio via openclaw infer audio"
    provider: file://./audio-provider.js
    vars:
      prompt: "voice-transcription-probe"  # unused by audio provider
    assert:
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: '"pinnedProvider":\s*"groq"'
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: '"pinnedModel":\s*"whisper-large-v3-turbo"'
      - type: javascript
        value: file://./assertions.js:responseMatches
        config:
          pattern: '"ok":\s*true'
      - type: not-icontains
        value: error
