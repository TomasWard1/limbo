services:
  limbo:
    image: ghcr.io/tomasward1/limbo:${LIMBO_IMAGE_TAG:-1.0.0}
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - limbo-data:/data
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const s=require('net').connect(18789,'127.0.0.1');const done=(code)=>{try{s.destroy()}catch{};process.exit(code)};s.on('connect',()=>done(0));s.on('error',()=>done(1));setTimeout(()=>done(1),2000);\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  limbo-data:
