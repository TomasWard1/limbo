name: Deploy install script

# Mirrors the GitLab CI `deploy-install-script` job. Publishes
# scripts/install.sh to Cloudflare Pages (project: heylimbo) so
# get.heylimbo.com serves the latest version.
#
# Requires repo secret: CLOUDFLARE_API_TOKEN (Pages:Edit scope).
# Requires repo secret: CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main, staging]
    paths:
      - scripts/install.sh
      - .github/workflows/deploy-install.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy scripts/ --project-name heylimbo --branch main --commit-dirty=true
