# GitLab CI/CD — equivalent of .github/workflows/{ci,promote,publish}.yml
# GitHub Actions originals are kept intact for when the account is restored.
#
# Runner topology:
#   - All stages run on a self-hosted GitLab runner (tag: self-hosted).
#     This gives us free minutes, persistent Docker layer cache (via the
#     host Docker socket), and fast feedback. No SaaS minutes consumed.
#   - The `release` job used to run on GitLab SaaS for OIDC trusted
#     publishing to npm, but npm does not yet accept id_tokens from
#     self-hosted runners. It was moved here with a classic NPM_TOKEN
#     instead. Revisit when npm supports self-hosted runners for
#     trusted publishing.

stages:
  - test
  - deploy
  - promote
  - release

variables:
  NODE_VERSION: "22"
  DOCKER_TLS_CERTDIR: "/certs"

# ─── Shared config for CI test jobs on self-hosted runner ─────────

.on-mr-or-staging: &on_mr_or_staging
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == "staging"

.self-hosted:
  tags:
    - self-hosted

# Cache node_modules for mcp-server keyed by its lockfile.
# Runs on self-hosted so the cache persists on the runner host.
.node-cache:
  cache:
    key:
      files:
        - mcp-server/package-lock.json
    paths:
      - mcp-server/node_modules/

# ─── CI: runs on MRs and staging pushes ───────────────────────────

docker-build:
  extends: .self-hosted
  stage: test
  image: docker:latest
  # No docker:dind service — we mount the host Docker socket instead.
  # This gives us persistent layer cache across pipeline runs for free,
  # which is the whole point of self-hosting. Security-wise it's fine
  # because the runner host is single-tenant (Tomas).
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  rules: *on_mr_or_staging
  script:
    - docker version
    - docker build --tag limbo:ci-test .

mcp-server-check:
  extends:
    - .self-hosted
    - .node-cache
  stage: test
  image: node:${NODE_VERSION}
  rules: *on_mr_or_staging
  before_script:
    - cd mcp-server && npm ci --prefer-offline && cd ..
  script:
    - node --check mcp-server/index.js
    - node --check setup-server/server.js

tests:
  extends:
    - .self-hosted
    - .node-cache
  stage: test
  image: node:${NODE_VERSION}
  rules: *on_mr_or_staging
  before_script:
    - cd mcp-server && npm ci --prefer-offline && cd ..
  script:
    - node -e "require('./cli.js')"
    - node --test test/cli-filter.test.js test/cli-auth.test.js test/openclaw-migration.test.js test/setup-server.test.js test/entrypoint.test.js test/cli-compose.test.js test/red-phase.test.js test/mcp-tools.test.js test/cli-wizard-parity.test.js

# ─── DEPLOY: publish install script to Cloudflare Pages ───────────
#
# Only runs when scripts/install.sh changes on staging or main.
# Deploys to get.heylimbo.com (Cloudflare Pages project: heylimbo).
# Requires CLOUDFLARE_API_TOKEN CI/CD variable (Pages:Edit scope).

deploy-install-script:
  extends: .self-hosted
  stage: deploy
  image: node:${NODE_VERSION}
  rules:
    - if: $CI_COMMIT_BRANCH == "staging" || $CI_COMMIT_BRANCH == "main"
      changes:
        - scripts/install.sh
  script:
    - npx wrangler pages deploy scripts/ --project-name heylimbo --branch main --commit-dirty=true

# ─── PROMOTE: auto-create MR from staging → main ──────────────────
#
# Runs on self-hosted: needs only curl/jq/git and GITLAB_TOKEN. No OIDC.
# GITLAB_TOKEN has protected=false so it is injected for any pipeline the
# self-hosted runner picks up, regardless of branch protection.

promote-staging-to-main:
  extends: .self-hosted
  stage: promote
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      # Determine bump type from commits on staging not on main
      git fetch origin main
      COMMITS=$(git log origin/main..origin/staging --pretty=format:"%s" 2>/dev/null || echo "")
      echo "--- Commits on staging not on main ---"
      echo "$COMMITS"

      if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
        TYPE="feat!"
      elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
        TYPE="feat"
      elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
        TYPE="fix"
      else
        TYPE="chore"
      fi

      echo "Bump type: $TYPE"

      # Check for existing MR
      EXISTING=$(curl -s --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?source_branch=staging&target_branch=main&state=opened" \
        | jq '.[0].iid // empty')

      if [ -z "$EXISTING" ]; then
        # Create new MR
        curl -s --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests" \
          -d "source_branch=staging" \
          -d "target_branch=main" \
          -d "title=${TYPE}: promote staging to main" \
          -d "remove_source_branch=false" | jq '.web_url'
        echo "Created new MR"
      else
        # Update existing MR title
        curl -s --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          -X PUT "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${EXISTING}" \
          -d "title=${TYPE}: promote staging to main" | jq '.web_url'
        echo "Updated existing MR #${EXISTING}"
      fi

# ─── RELEASE: manual trigger on main via RELEASE=true variable ────
#
# Architecture:
#   - package.json is the source of truth for the version (set locally by
#     the dev using `npx release-it` before merging to staging).
#   - This job is manual (only runs when RELEASE=true is set via "Run pipeline"
#     in the GitLab UI). Merging staging→main does NOT auto-publish.
#   - The job is read-only over git state: no commits, no branch pushes.
#     It only pushes an annotated tag at the end.
#   - Idempotent: if the version in package.json is already on npm, skip.
#   - Runs on the self-hosted runner. Uses a classic npm automation token
#     (NPM_TOKEN) instead of OIDC trusted publishing, because npm does not
#     yet accept id_tokens from self-hosted GitLab runners. Trade-off: no
#     provenance attestation on published packages. Migrate to OIDC when
#     npm lifts the restriction.
#
# Release workflow (end-to-end):
#   1. Dev bumps locally: `git checkout staging && npx release-it`
#   2. release-it bumps package.json + generates CHANGELOG.md + commits
#      (tag/push/publish all disabled in .release-it.json)
#   3. Dev pushes: `git push gitlab staging`
#   4. auto-promote MR updates; dev merges it to main
#   5. Dev goes to GitLab UI → CI/CD → Pipelines → "Run pipeline"
#      Branch: main, Variable: RELEASE=true → click "Run pipeline"
#   6. This job publishes npm + docker + tag + GitLab Release.
#
# Required CI/CD variables (project settings):
#   - NPM_TOKEN     — npm automation token, scope: publish. Mark Hidden + Masked.
#   - GITLAB_TOKEN  — PAT with api scope. Mark Hidden + Masked.

release:
  extends: .self-hosted
  stage: release
  image: docker:latest
  # No dind service — use host Docker socket on the self-hosted runner,
  # same pattern as docker-build, for persistent layer cache.
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $RELEASE == "true"
      when: on_success
  before_script:
    - apk add --no-cache nodejs npm git jq curl
    - npm install -g npm@11.6.2
  script:
    - |
      set -eo pipefail

      # ── Preflight: required secrets ──
      if [ -z "${NPM_TOKEN:-}" ]; then
        echo "ERROR: NPM_TOKEN is not set. Create an automation token at:"
        echo "  https://www.npmjs.com/settings/<your-user>/tokens/new"
        echo "Then add it as a CI/CD variable: Settings → CI/CD → Variables"
        echo "  Key: NPM_TOKEN  |  Hidden: ✔  |  Masked: ✔  |  Protected: as needed"
        exit 1
      fi
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_TOKEN is not set."
        exit 1
      fi

      # ── Read version from package.json (single source of truth) ──
      VERSION=$(node -p "require('./package.json').version")
      echo "Target version: $VERSION"

      # ── Validate CalVer format: YYYY.M.N ──
      # Accepts e.g. 2026.4.0, 2026.12.3. Rejects 2026.04.0 (leading zero on month),
      # 1.32.0 (old semver), 2026.4 (missing micro), etc.
      if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]*\.[0-9]+$'; then
        echo "ERROR: version '$VERSION' does not match CalVer format YYYY.M.N"
        echo "Expected: 4-digit year, 1-2 digit month (no leading zero), integer counter."
        exit 1
      fi

      # ── Idempotency: if npm is already published, reconcile tag/release only ──
      # `npm view` is an unauthenticated read, so no .npmrc needed here.
      NPM_PUBLISHED=false
      if npm view "limbo-ai@${VERSION}" version >/dev/null 2>&1; then
        NPM_PUBLISHED=true
        echo "Version ${VERSION} already on npm — skipping Docker/npm publish and reconciling tag/release"
      else
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f1-2)
        echo "Publishing version: $VERSION (major=${MAJOR}, minor=${MINOR})"

        # ── Docker: build and push to GitLab Container Registry ──
        IMAGE="${CI_REGISTRY_IMAGE}"
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

        docker build \
          --tag "${IMAGE}:${VERSION}" \
          --tag "${IMAGE}:${MINOR}" \
          --tag "${IMAGE}:${MAJOR}" \
          --tag "${IMAGE}:latest" \
          .

        docker push "${IMAGE}:${VERSION}"
        docker push "${IMAGE}:${MINOR}"
        docker push "${IMAGE}:${MAJOR}"
        docker push "${IMAGE}:latest"

        # ── npm publish via automation token ──
        # Write auth to a job-scoped .npmrc (not ~/.npmrc) so it doesn't leak
        # into container layers or persist on the runner host across jobs.
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        trap 'rm -f .npmrc' EXIT
        npm publish --access public
      fi

      # ── Git: create annotated tag and push ONLY the tag (no branch mutation) ──
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@users.noreply.gitlab.com"
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      TAG="v${VERSION}"
      if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
        echo "Tag ${TAG} already exists on origin — skipping tag push"
      else
        git tag -a "${TAG}" -m "Release ${TAG}"
        git push origin "${TAG}"
      fi
      git fetch --tags origin

      # ── Create GitLab Release ──
      PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
      if [ -n "$PREV_TAG" ]; then
        CHANGELOG_BODY=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
      else
        CHANGELOG_BODY=$(git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges)
      fi

      RELEASE_PAYLOAD=$(jq -n \
        --arg tag_name "${TAG}" \
        --arg name "Limbo ${TAG}" \
        --arg description "$CHANGELOG_BODY" \
        '{tag_name: $tag_name, name: $name, description: $description}')
      RELEASE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${TAG}"

      if curl -fsS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" "${RELEASE_URL}" >/dev/null; then
        echo "Release ${TAG} already exists — updating it"
        curl -fsS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          -X PUT "${RELEASE_URL}" \
          -H "Content-Type: application/json" \
          -d "${RELEASE_PAYLOAD}"
      else
        echo "Release ${TAG} does not exist yet — creating it"
        curl -fsS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
          -H "Content-Type: application/json" \
          -d "${RELEASE_PAYLOAD}"
      fi

      echo "Released v${VERSION}"
