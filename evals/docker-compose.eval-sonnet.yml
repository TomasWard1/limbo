# Eval-mode Limbo pointed at Anthropic Claude Sonnet 4.6 via LiteLLM.
#
# Adds postgres + litellm side-cars (mirroring docker-compose.local-whatsapp.yml)
# and overrides the limbo service env to use LITELLM_ENABLED=true. Additive to
# the OpenAI eval flow — use the original docker-compose.eval.yml for A/B
# comparison.
#
# Usage (see evals/promptfoo/run-sonnet.sh for the wrapper):
#   1. bash evals/scripts/bootstrap-eval-sonnet.sh   # mints virtual key, writes env files
#   2. LIMBO_IMAGE=limbo:eval docker compose -f evals/docker-compose.eval-sonnet.yml up -d --wait
#   3. cd evals/promptfoo && LIMBO_EVAL_CONTAINER=limbo-eval-sonnet npx promptfoo eval
#
# Container names end in `-eval` so they don't collide with the WhatsApp
# stack (project kapso-integration, containers limbo/postgres/litellm).
services:
  postgres-eval:
    image: postgres:16-alpine
    container_name: postgres-eval
    restart: "no"
    env_file:
      - /tmp/limbo-eval-sonnet/config/postgres.env
    volumes:
      - limbo-eval-sonnet-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  litellm-eval:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-eval
    restart: "no"
    depends_on:
      postgres-eval:
        condition: service_healthy
    ports:
      # Publish so the host bootstrap script can hit /key/generate.
      - "127.0.0.1:4100:4000"
    volumes:
      - /tmp/limbo-eval-sonnet/litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - /tmp/limbo-eval-sonnet/config/litellm.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  limbo-eval-sonnet:
    image: ${LIMBO_IMAGE:?LIMBO_IMAGE must be set (for example LIMBO_IMAGE=limbo:eval)}
    container_name: limbo-eval-sonnet
    init: true
    restart: "no"
    depends_on:
      litellm-eval:
        condition: service_healthy
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - limbo-eval-sonnet-data:/data
      - ./vault-seed:/data/vault
      - limbo-eval-sonnet-zc:/home/limbo/.openclaw
      - /tmp/limbo-eval-sonnet/config/.env:/data/config/.env
      - ~/.limbo-dev/secrets/auth-profiles.json:/data/config/auth-profiles.json:ro
    # config/.env (generated by bootstrap-eval-sonnet.sh) carries
    # LLM_API_KEY=<virtual key>, GATEWAY_TOKEN, and non-secret toggles.
    # eval-tokens.env still supplies GROQ/BRAVE/TELEGRAM secrets for parity
    # with the OpenAI compose file.
    env_file:
      - ~/.limbo-dev/eval-tokens.env
    environment:
      LIMBO_EVAL: "true"
      LIMBO_PORT: "18790"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp:size=100M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18790/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  limbo-eval-sonnet-data:
  limbo-eval-sonnet-zc:
  limbo-eval-sonnet-pg-data:
