name: Release

# Triggered on push to main (after a release-it bump commit lands) or
# manually via workflow_dispatch. Reads the version from package.json
# (single source of truth); skips cleanly if that version is already
# on npm (idempotent). No auto-bump, no commits back to main — the
# bump is done locally by the dev with `npx release-it`.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm for trusted publishing
        run: npm install -g npm@11.6.2

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Target version: $VERSION"

          # Validate CalVer: YYYY.M.N (no leading zero on month)
          if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]*\.[0-9]+$'; then
            echo "ERROR: version '$VERSION' does not match CalVer YYYY.M.N"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_version=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor_version=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Idempotency check (skip if already on npm)
        id: npm_check
        run: |
          if npm view "limbo-ai@${{ steps.version.outputs.new_version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.new_version }} already on npm — will reconcile tag/release only"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        if: steps.npm_check.outputs.already_published == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.npm_check.outputs.already_published == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.npm_check.outputs.already_published == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Dual-push to GitLab registry during migration window so existing
      # prod installs (which still pull from registry.gitlab.com) keep
      # working. Gated on ENABLE_GITLAB_DUAL_PUSH repo variable — if absent
      # or not 'true', this step is skipped and only GHCR gets pushed.
      - name: Log in to GitLab Container Registry
        id: gitlab_login
        if: steps.npm_check.outputs.already_published == 'false' && vars.ENABLE_GITLAB_DUAL_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Build and push images (GHCR + optional GitLab)
        if: steps.npm_check.outputs.already_published == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.new_version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.minor_version }}
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.major_version }}
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.gitlab_login.conclusion == 'success' && format('registry.gitlab.com/tomas209/limbo:{0}', steps.version.outputs.new_version) || '' }}
            ${{ steps.gitlab_login.conclusion == 'success' && format('registry.gitlab.com/tomas209/limbo:{0}', steps.version.outputs.minor_version) || '' }}
            ${{ steps.gitlab_login.conclusion == 'success' && format('registry.gitlab.com/tomas209/limbo:{0}', steps.version.outputs.major_version) || '' }}
            ${{ steps.gitlab_login.conclusion == 'success' && 'registry.gitlab.com/tomas209/limbo:latest' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test published image
        if: steps.npm_check.outputs.already_published == 'false'
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          IMAGE="${IMAGE_NAME}:${IMAGE_VERSION}"
          docker pull --platform linux/amd64 "$IMAGE"
          CID=$(docker run -d -p 18789:18789 -e ANTHROPIC_API_KEY=smoke-test-key "$IMAGE")
          sleep 8
          docker logs "$CID" || true
          docker stop "$CID" || true
          docker rm "$CID" || true

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published == 'false'
        run: npm publish --provenance --access public

      # Tag + Release always run (also when reconciling). Both are
      # idempotent so re-runs on the same version are safe.
      - name: Push annotated tag
        env:
          VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — skipping tag push"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi
          git fetch --tags origin

      - name: Generate changelog body
        env:
          TAG: v${{ steps.version.outputs.new_version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges > /tmp/changelog.md
          else
            git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges > /tmp/changelog.md
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: "Limbo v${{ steps.version.outputs.new_version }}"
          body_path: /tmp/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
