services:
  # LiteLLM side-car. Routes OpenClaw's LLM calls to the real provider
  # (Anthropic / OpenAI / etc.) via virtual keys, so Limbo never holds
  # the production API key and we gain per-tenant budgets + usage logs.
  # Enable by setting LITELLM_ENABLED=true + LITELLM_URL=http://litellm:4000/v1
  # in ~/.limbo/config/.env and providing litellm-config.yaml + secrets.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      - litellm-data:/app/db
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - ./config/litellm.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health/readiness"]
      interval: 30s
      timeout: 5s
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  limbo:
    # This file is a development reference. The CLI generates a versioned copy at install time.
    image: registry.gitlab.com/tomas209/limbo:latest
    depends_on:
      litellm:
        condition: service_healthy
        required: false
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev
      - /home/limbo/.npm:size=50M,noexec,nosuid,nodev,uid=999,gid=999
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - limbo-data:/data
      - ./vault:/data/vault
      - ./openclaw-state:/home/limbo/.openclaw
      - ./config:/data/config
      - ./flags:/flags
    env_file:
      - ./config/.env
    environment:
      NODE_OPTIONS: "${LIMBO_NODE_OPTIONS:---max-old-space-size=512}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  limbo-data:
  litellm-data:
